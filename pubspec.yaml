name: lexicon
description: "Lexicon - The pass and play party game."
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.5
  google_mobile_ads: ^5.1.0
  purchases_flutter: ^8.1.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

# This must be at the very bottom and not indented
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"